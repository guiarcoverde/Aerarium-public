<div class="settings-card">
  <header class="settings-header">
    <h2>{{ 'settings.accountInfo' | translate }}</h2>
    <p>{{ 'settings.accountInfoSubtitle' | translate }}</p>
  </header>

  <form class="section" (ngSubmit)="save()">
    <div class="section-head">
      <h3>{{ 'settings.personalInfo' | translate }}</h3>
      @if (!editing()) {
        <button class="edit-btn" type="button" (click)="enterEdit()" [disabled]="loading()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
          </svg>
          {{ 'common.edit' | translate }}
        </button>
      } @else {
        <div class="edit-actions">
          <button class="edit-btn" type="button" (click)="cancel()" [disabled]="saving()">
            {{ 'common.cancel' | translate }}
          </button>
          <button class="edit-btn" type="submit" [disabled]="saving()">
            {{ (saving() ? 'common.saving' : 'common.save') | translate }}
          </button>
        </div>
      }
    </div>

    @if (error()) {
      <div class="alert alert--error">{{ error() | translate }}</div>
    }
    @if (successMessage()) {
      <div class="alert alert--success">{{ successMessage() | translate }}</div>
    }

    <div class="grid">
      <div class="field">
        <label for="firstName">{{ 'settings.firstName' | translate }}</label>
        <input id="firstName" type="text" [placeholder]="'settings.firstNamePlaceholder' | translate"
          [disabled]="!editing()" [ngModel]="firstName()" (ngModelChange)="firstName.set($event)" name="firstName" />
      </div>

      <div class="field">
        <label for="lastName">{{ 'settings.lastName' | translate }}</label>
        <input id="lastName" type="text" [placeholder]="'settings.lastNamePlaceholder' | translate"
          [disabled]="!editing()" [ngModel]="lastName()" (ngModelChange)="lastName.set($event)" name="lastName" />
      </div>

      <div class="field">
        <label for="dob">{{ 'settings.dateOfBirth' | translate }}</label>
        <div class="input-wrap">
          <input id="dob" type="date"
            [disabled]="!editing()" [ngModel]="dateOfBirth()" (ngModelChange)="dateOfBirth.set($event)" name="dateOfBirth" />
          <svg class="input-suffix" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
        </div>
      </div>

      <div class="field">
        <label for="mobile">{{ 'settings.mobileNumber' | translate }}</label>
        <input id="mobile" type="tel" [placeholder]="'settings.mobilePlaceholder' | translate"
          [disabled]="!editing()" [ngModel]="mobileNumber()" (ngModelChange)="mobileNumber.set($event)" name="mobileNumber" />
      </div>

      <div class="field field--full">
        <label for="email">{{ 'settings.email' | translate }}</label>
        <div class="input-wrap">
          <svg class="input-prefix" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
          <input id="email" type="email" [value]="email()" disabled class="has-prefix" name="email" />
        </div>
      </div>
    </div>
  </form>
</div>
